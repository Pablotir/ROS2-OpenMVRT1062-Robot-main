# nav2_params.yaml
# ================
# Nav2 configuration for the mecanum-drive Jetson bot.
#
# Key choices:
#   - DWB local planner  (supports holonomic / omnidirectional robots)
#   - NavFn global planner
#   - AMCL disabled – we use slam_toolbox for localisation (provides map→odom TF)
#   - Costmap obstacle layer uses /scan (LiDAR) and /ultrasonic_range (HC-SR04)
#
# Robot dimensions: 47 cm wide × 34.3 cm long (rectangular footprint)
# LiDAR: mounted rear-right corner, 11 cm from rear, 17.5 cm from right edge

amcl:
  ros__parameters:
    use_sim_time: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # BT XML paths: omitted so Nav2 auto-resolves via ament_index
    # (works regardless of apt vs source install location)
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node

      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001     # enable lateral (mecanum)
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30        # 30 cm tolerance (generous for exploration)
      yaw_goal_tolerance: 0.50       # ~29 degrees (don't care about heading for exploration)

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      # ── Velocity limits (increased for confident exploration) ──
      min_vel_x: -0.20
      min_vel_y: -0.20              # mecanum can strafe
      max_vel_x:  0.35              # ~0.35 m/s max forward
      max_vel_y:  0.25              # strafe speed
      max_vel_theta: 1.0            # rad/s
      min_speed_xy:  0.0
      max_speed_xy:  0.35
      min_speed_theta: 0.0
      # ── Acceleration limits ──
      acc_lim_x:  0.5
      acc_lim_y:  0.5
      acc_lim_theta: 1.2
      decel_lim_x: -0.5
      decel_lim_y: -0.5
      decel_lim_theta: -1.2
      # ── Trajectory sampling ──
      vx_samples: 15
      vy_samples: 3
      vtheta_samples: 30
      sim_time: 2.0                 # look 2s ahead for obstacle avoidance
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 1.0     # HIGH — the Jetson has TF jitter
      xy_goal_tolerance: 1.0       # HIGH — just get near the frontier
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        ["RotateToGoal", "Oscillation", "BaseObstacle",
         "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # ── Critic weights ──
      # BaseObstacle scale was paralyzed by inflation cost; reducing to 2.0
      BaseObstacle.scale: 2.0
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0          # Strictly adhere to the globally-planned centerline
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 1.0
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.0
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.3
    rotational_acc_lim: 0.8

# ── Local costmap ──────────────────────────────────────────────────────────────
# CRITICAL: Uses rectangular footprint matching the actual robot chassis.
# transform_tolerance raised to 1.0 s to prevent LiDAR message drops.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 4            # 4 m × 4 m window
      height: 4
      resolution: 0.05
      transform_tolerance: 1.0    # HIGH — prevents LiDAR scan drops

      # Rectangular footprint: 47 cm wide × 34.3 cm long (with 3 cm padding)
      # Coordinates are [x, y] corners relative to base_link centre
      footprint: "[[-0.20, -0.26], [-0.20, 0.26], [0.20, 0.26], [0.20, -0.26]]"

      plugins: ["obstacle_layer", "range_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_max_range: 5.0       # reduced from 12 — only trust nearby readings
          obstacle_min_range: 0.10      # ignore points inside the robot body
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        enabled: true
        topics: ["/ultrasonic_range"]
        phi: 0.26
        inflate_cone: 1.0
        no_readings_timeout: 0.0
        clear_threshold: 0.2
        mark_threshold: 0.8
        clear_on_max_reading: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0       # fast falloff keeps corridor centers cheap
        inflation_radius: 0.35         # 35 cm — tight enough for doorways
      always_send_full_costmap: true

# ── Global costmap ─────────────────────────────────────────────────────────────
# Rolling window: the costmap follows the robot instead of matching the
# static SLAM map.  This prevents worldToMap errors when the obstacle layer
# tries to mark LiDAR returns beyond the SLAM map boundary.  The frontier
# explorer reads /map directly from slam_toolbox, so no static_layer needed.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05
      transform_tolerance: 1.0
      track_unknown_space: true

      # Same rectangular footprint as local costmap
      footprint: "[[-0.20, -0.26], [-0.20, 0.26], [0.20, 0.26], [0.20, -0.26]]"

      plugins: ["obstacle_layer", "range_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_max_range: 5.0
          obstacle_min_range: 0.10
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        enabled: true
        topics: ["/ultrasonic_range"]
        phi: 0.26
        inflate_cone: 1.0
        no_readings_timeout: 0.0
        clear_threshold: 0.2
        mark_threshold: 0.8
        clear_on_max_reading: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.35
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
