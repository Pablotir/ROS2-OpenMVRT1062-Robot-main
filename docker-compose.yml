# ──────────────────────────────────────────────────────────────────────────────
# Jetson Bot — Docker Compose (VILA 2.7B via nano_llm)
# ──────────────────────────────────────────────────────────────────────────────
# Replaces the old ros2:iron + Ollama setup with dustynv/nano_llm:humble
# which bundles ROS2 Humble + nano_llm + CUDA/TensorRT/cuDNN.
#
# Usage (on Jetson):
#   docker compose down                     # stop old containers
#   docker compose up -d                    # start nano_llm container
#   docker exec -it jetson_bot_vila bash    # enter the container
#
# First-time setup (inside container):
#   bash /root/ros2_ws/src/jetson_bot_slam/setup_vila.sh
#   OR: bash /root/ros2_ws/setup_vila.sh  (if mounted at root)

services:
  robot:
    # Build our custom image on top of dustynv/nano_llm.
    # All ROS2 packages and the workspace are baked in — no setup needed.
    # Run `docker compose build` once (or after changing dependencies).
    # Then `docker compose up -d` starts instantly every time.
    build:
      context: .
      dockerfile: ros2.Dockerfile
    image: jetson_bot_custom:latest
    container_name: jetson_bot_vila
    network_mode: "host"
    runtime: nvidia
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.docker.xauth
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    #user: "1000:1000"    # write files as pablo (not root) so maps/logs are accessible on host
    devices:
      - /dev/roboclaw_left:/dev/roboclaw_left    # RoboClaw Left  (M1=Rear-Left,  M2=Front-Left)
      - /dev/roboclaw_right:/dev/roboclaw_right  # RoboClaw Right (M1=Rear-Right, M2=Front-Right)
      - /dev/lidar:/dev/lidar                    # STL-27L LiDAR (CP210x → /dev/lidar symlink)
      # - /dev/video0:/dev/video0                  # USB camera (uncomment when connected)
      # - /dev/video1:/dev/video1                  # USB camera (alternate index)
    volumes:
      - ./src:/root/ros2_ws/src           # live-reload Python nodes
      - ./maps:/root/maps                 # persisted SLAM maps
      - ./logs:/root/ros2_ws/logs         # AI decision logs + captured frames
      - ./setup_vila.sh:/root/ros2_ws/setup_vila.sh  # setup script
      - nano_llm_models:/root/.cache      # persist downloaded VILA model
      - /tmp/.X11-unix:/tmp/.X11-unix     # X11 display socket for RViz
      - /tmp/.docker.xauth:/tmp/.docker.xauth  # X11 auth cookie
    command: ["bash"]

  # NOTE: Ollama is no longer needed — VILA runs natively via nano_llm
  # inside the robot container above. Keeping this commented for reference.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   network_mode: "host"
  #   runtime: nvidia
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0:8080
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   profiles: ["ollama"]

volumes:
  nano_llm_models:
    # Named volume so VILA model weights survive container restarts
